name: Publish Helm Chart

on:
  push:
    branches:
      - main
      - helm-chart
    paths:
      - 'helm/**'
  release:
    types: [published]

jobs:
  publish-helm-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: '3.13.0'

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm dependency update helm/geodini
          mkdir -p ./chart-packages
          helm package helm/geodini --destination ./chart-packages

      - name: Push Helm chart to GHCR
        run: |
          helm push ./chart-packages/*.tgz oci://ghcr.io/developmentseed/geodini/helm-chart

      - name: List packaged charts
        run: |
          ls -la ./chart-packages/
