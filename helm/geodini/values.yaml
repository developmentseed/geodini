# Default values for geodini-chart.
replicaCount: 1

api:
  image:
    repository: ghcr.io/developmentseed/geodini/api
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      memory: "4Gi"
  port: 9000
  service:
    type: ClusterIP
    port: 9000
  env:
    PORT: "9000"
    POSTGRES_HOST: "geodini-postgres" # Service name of our postgres
    POSTGRES_PORT: "5432"
    REDIS_HOST: "geodini-redis-master" # Service name of Redis subchart
    REDIS_PORT: "6379"
    REDIS_DB: "0"
    OVERTURE_DATA_VERSION: "2025-10-22.0" # Overture now only maintain data for 60 days so this will need to be updated https://docs.overturemaps.org/blog/2025/09/24/release-notes/
    # Geometry configuration
    GEOMETRY_DECIMAL_PRECISION: "6"         # Decimal places for coordinate rounding
    GEOMETRY_DB_SIMPLIFY_TOLERANCE: "0.001" # ST_Simplify tolerance in degrees
    GEOMETRY_AGENT_SIMPLIFY_TOLERANCE: "10000" # Shapely simplification tolerance in meters
    GEOMETRY_MCP_SIMPLIFY_TOLERANCE: "1000" # MCP simplification tolerance in meters
    GEOMETRY_MAX_BYTES: "0"                 # Max geometry size in bytes (0 = disabled)
    # Model configuration — provider:model format (e.g., openai:gpt-4.1-mini, anthropic:claude-haiku-4-5, ollama:llama3)
    MODEL_LIGHT: "anthropic:claude-haiku-4-5"   # Fast/cheap tasks: rephrase, routing, rerank
    MODEL_HEAVY: "anthropic:claude-sonnet-4-6"  # SQL generation and error correction
    # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB are taken from a secret
  initContainer:
    ingest:
      command: ["python", "geodini/ingest.py"]
      resources:
        requests:
          memory: "2Gi"
        limits:
          memory: "4Gi"
      forceRecreate: false

# Frontend (Streamlit) configuration
frontend:
  enabled: false  # Set to true to enable Streamlit frontend
  image:
    repository: ghcr.io/developmentseed/geodini/api  # Same image as API
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  port: 8501
  service:
    type: ClusterIP
    port: 8501
  env:
    API_URL: "http://geodini-api:9000"  # Internal API service URL

# PostgreSQL/PostGIS configuration
postgres:
  enabled: true
  image:
    repository: postgis/postgis
    tag: "16-3.4" # Using 16 as 17 is not yet in postgis/postgis official images
    pullPolicy: IfNotPresent
  port: 5432
  service:
    type: ClusterIP # Internal service
    port: 5432
  # user, password, database configured in 'secrets'
  # Postgres needs special security context: entrypoint runs as root, then drops to uid 999
  podSecurityContext:
    fsGroup: 999
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  persistence:
    enabled: true
    storageClassName: "" # Or your specific storage class
    accessModes:
      - ReadWriteOnce
    size: 40Gi # Adjust as needed

# Redis subchart configuration
redis:
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: "7.2.4-debian-12-r9"
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      storageClass: "" # Or your specific storage class
      size: 8Gi # Adjust as needed
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  replica:
    replicaCount: 0 # Disable replicas for simplicity

ingress:
  enabled: false
  className: "nginx" # Or your ingress controller's class name
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod # Example for cert-manager

  # API Ingress Configuration
  apiHost: "api.geodini.local" # Placeholder, e.g., api.yourdomain.com
  
  # Frontend Ingress Configuration (only used if frontend.enabled is true)
  frontendHost: "geodini.local" # Placeholder, e.g., geodini.yourdomain.com

  # Common TLS configuration.
  # You can define one or more secrets.
  # If you have separate certs for frontendHost and apiHost, list them here.
  # If you have a wildcard cert covering both, one entry is sufficient.
  tls: []
  # Example for separate certs:
  # - secretName: geodini-api-tls
  #   hosts:
  #     - api.geodini.local # Must match ingress.apiHost
  # Example for a wildcard cert:
  # - secretName: geodini-wildcard-tls
  #   hosts:
  #     - api.geodini.local

# Security contexts applied to all pods/containers by default
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# Centralized secrets
secrets:
  # Set existingSecret to use a pre-created Kubernetes Secret (e.g., from Vault, Sealed Secrets)
  # When set, the chart will not create its own Secret resource
  existingSecret: ""
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "" # REQUIRED: Set via --set or values file
  POSTGRES_DB: "postgres"
  LLM_API_KEY: "" # REQUIRED: Set via --set or values file. Auto-maps to provider-specific env var (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.)
